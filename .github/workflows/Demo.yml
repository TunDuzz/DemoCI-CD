name: Build, Push and Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/demo-app:latest

      - name: Verify image is publicly accessible
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/demo-app:latest"
          echo "Checking public access for $IMAGE ..."
          docker logout
          if docker pull "$IMAGE" > /dev/null 2>&1; then
            echo "✅ Image is publicly accessible"
          else
            echo "❌ Image is NOT public! Go to:"
            echo "   https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/demo-app/settings"
            echo "   → Change Visibility to PUBLIC"
            exit 1
          fi

      - name: Deploy to DevOps Classroom
        run: |
          set -euo pipefail

          REPO="${{ secrets.DOCKER_USERNAME }}/demo-app"
          TAG="latest"
          CONTAINER_PORT=80
          MAX_RETRIES=3

          echo "Deploy target:"
          echo "  repo=$REPO"
          echo "  tag=$TAG"
          echo "  slot=4"
          echo "  container_port=$CONTAINER_PORT"

          for i in $(seq 1 $MAX_RETRIES); do
            echo ""
            echo "Attempt $i/$MAX_RETRIES..."

            RESPONSE=$(curl -m 1200 -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=$TAG&slot=4&container_port=$CONTAINER_PORT&strict_container_port=0" || true)

            BODY=$(echo "$RESPONSE" | sed '$d')
            CODE=$(echo "$RESPONSE" | tail -n1)

            echo "HTTP Code: $CODE"

            echo "::group::Response JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"

            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
              echo "✅ Deploy success on attempt $i!"
              exit 0
            fi

            if [ "$CODE" = "502" ]; then
              echo "❌ 502: Slot cannot pull image. Is repo PUBLIC on Docker Hub?"
            elif [ "$CODE" = "524" ]; then
              echo "❌ 524: Timeout. Slot may still be starting, check manually."
            fi

            echo "Attempt $i failed (HTTP $CODE)"
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in 30 seconds..."
              sleep 30
            fi
          done

          echo "❌ Deploy failed after $MAX_RETRIES attempts"
          exit 1